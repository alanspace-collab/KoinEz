<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketuk Koin Nyata</title>
    
    <!-- SDK IKLAN BARU KAMU (ZONE: 11205903) -->
    <script src='//libtl.com/sdk.js' data-zone='11205903' data-sdk='show_11205903'></script>

    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            padding-bottom: 80px;
        }
        .container { margin-top: 20px; }
        h1 { color: #f39c12; font-size: 26px; margin-bottom: 5px; }
        .score-box {
            font-size: 42px;
            font-weight: bold;
            margin: 10px 0;
            color: #f1c40f;
        }
        .energy-box {
            font-size: 16px;
            color: #bdc3c7;
            margin-bottom: 20px;
        }
        .coin-btn {
            background: radial-gradient(circle, #f39c12, #d35400);
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: 6px solid #f1c40f;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            font-size: 60px;
            color: white;
            cursor: pointer;
            outline: none;
            transition: transform 0.1s;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .coin-btn:active { transform: scale(0.92); }
        
        .ad-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 15px;
            border-radius: 25px;
            margin-top: 20px;
            font-weight: bold;
            cursor: pointer;
            width: 90%;
            max-width: 300px;
        }
        
        /* NAVBAR */
        .navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #2c3e50;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            box-shadow: 0 -5px 10px rgba(0,0,0,0.3);
            z-index: 100;
        }
        .nav-item {
            color: #bdc3c7;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
        }
        .nav-item.active { color: #f1c40f; }

        /* PAGES */
        .page { display: none; }
        .page.active { display: block; }
        .reward-card {
            background-color: #2c3e50;
            border-radius: 12px;
            padding: 15px;
            margin: 15px auto;
            max-width: 90%;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .reward-info h3 { margin: 0; color: #fff; font-size: 18px; }
        .reward-info p { margin: 5px 0 0 0; color: #f1c40f; font-weight: bold; }
        .redeem-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- ==================== TAB 1: GAME ==================== -->
    <div id="game-page" class="page active">
        <div class="container">
            <h1>KUMPULKAN KOIN</h1>
            
            <div class="score-box" id="score">0</div>
            
            <!-- Tampilan Energi Berkurang/Bertambah -->
            <div class="energy-box">⚡ Energi: <span id="energy">500</span>/500</div>
            
            <button class="coin-btn" onclick="tambahPoin()">🪙</button>
            <br>
            
            <!-- Tombol Iklan Baru Kamu -->
            <button class="ad-btn" onclick="tontonIklan()">📺 Nonton Iklan (Bonus +50 Poin)</button>
        </div>
    </div>

    <!-- ==================== TAB 2: HADIAH ==================== -->
    <div id="reward-page" class="page">
        <div class="container">
            <h1>TUKAR HADIAH</h1>
            <p>Saldo Poin Kamu: <span id="reward-score" style="color: #f1c40f; font-weight: bold;">0</span> Poin</p>
            <hr style="border: 1px solid #34495e; width: 90%;">

            <div class="reward-card">
                <div class="reward-info">
                    <h3>Saldo DANA Rp 5.000</h3>
                    <p>50.000 Poin</p>
                </div>
                <button class="redeem-btn" onclick="tukarHadiah('DANA Rp 5.000', 50000)">Tukar</button>
            </div>

            <div class="reward-card">
                <div class="reward-info">
                    <h3>Saldo DANA Rp 10.000</h3>
                    <p>100.000 Poin</p>
                </div>
                <button class="redeem-btn" onclick="tukarHadiah('DANA Rp 10.000', 100000)">Tukar</button>
            </div>
        </div>
    </div>

    <!-- MENU BAWAH -->
    <div class="navbar">
        <button class="nav-item active" id="btn-game" onclick="bukaTab('game')">🎮 Game</button>
        <button class="nav-item" id="btn-reward" onclick="bukaTab('reward')">🎁 Hadiah</button>
    </div>

    <script>
        // Logika Penyimpanan Data Sementara Bawaan HP
        let poin = parseInt(localStorage.getItem('saldoPoin')) || 0;
        let energi = parseInt(localStorage.getItem('sisaEnergi'));
        
        // Set default energi ke 500 jika baru pertama main
        if (isNaN(energi)) energi = 500;

        const scoreDisplay = document.getElementById('score');
        const rewardScoreDisplay = document.getElementById('reward-score');
        const energyDisplay = document.getElementById('energy');
        
        scoreDisplay.innerText = poin;
        rewardScoreDisplay.innerText = poin;
        energyDisplay.innerText = energi;

        // Otomatis isi ulang energi +1 setiap 3 detik ketika game dibuka
        setInterval(() => {
            if (energi < 500) {
                energi += 1;
                energyDisplay.innerText = energi;
                localStorage.setItem('sisaEnergi', energi);
            }
        }, 3000);

        // FUNGSI KETUK KOIN
        function tambahPoin() {
            if (energi > 0) {
                poin += 1;
                energi -= 1;
                updateTampilan();
            } else {
                alert("Energi habis! Tunggu terisi otomatis atau tonton iklan untuk bonus koin.");
            }
        }

        function updateTampilan() {
            scoreDisplay.innerText = poin;
            rewardScoreDisplay.innerText = poin;
            energyDisplay.innerText = energi;
            localStorage.setItem('saldoPoin', poin);
            localStorage.setItem('sisaEnergi', energi);
        }

        // INTEGRASI KODE IKLAN POPUP BARU KAMU (11205903)
        function tontonIklan() {
            show_11205903('pop').then(() => {
                // EKSPLORASI HADIAH JIKA BERHASIL NONTON SAMPAI SELESAI
                poin += 50; 
                energi = 500; // Sekaligus isi ulang energi penuh!
                updateTampilan();
                alert("Sukses! +50 Poin dan Energi kamu terisi penuh kembali!");
            }).catch(e => {
                alert("Iklan gagal dimuat atau ditutup terlalu cepat.");
            });
        }

        // SISTEM NAVIGASI HALAMAN
        function bukaTab(namaTab) {
            document.getElementById('game-page').classList.remove('active');
            document.getElementById('reward-page').classList.remove('active');
            document.getElementById('btn-game').classList.remove('active');
            document.getElementById('btn-reward').classList.remove('active');

            if(namaTab === 'game') {
                document.getElementById('game-page').classList.add('active');
                document.getElementById('btn-game').classList.add('active');
            } else {
                document.getElementById('reward-page').classList.add('active');
                document.getElementById('btn-reward').classList.add('active');
            }
        }

        // KLAIM HADIAH
        function tukarHadiah(namaHadiah, syaratPoin) {
            if (poin < syaratPoin) {
                alert("Poin kamu belum cukup untuk menukar " + namaHadiah);
            } else {
                let nomorEwallet = prompt("Masukkan nomor DANA/HP kamu:");
                if (nomorEwallet) {
                    poin -= syaratPoin;
                    updateTampilan();
                    alert("Klaim berhasil diproses!");
                    window.open("https://t.me/CQClickQoinEz_bot?text=Halo%20Admin,%20saya%20mau%20klaim%20" + encodeURIComponent(namaHadiah) + "%20ke%20nomor%20" + nomorEwallet);
                }
            }
        }
    </script>

</body>
</html>
